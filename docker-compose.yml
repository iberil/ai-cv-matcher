version: '3.8'

services:
  db:
    image: postgres:15
    container_name: cv-matcher
    restart: always
    environment:
      POSTGRES_USER: iberil
      POSTGRES_PASSWORD: 7578
      POSTGRES_DB: cv-matcher_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql

volumes:
  pgdata: